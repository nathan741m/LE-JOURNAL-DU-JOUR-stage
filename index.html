<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Journal amélioré</title>

<style>
body {
  font-family: "Times New Roman", serif;
  margin: 0;
  background: #f4f4f4;
}

header {
  background: #c00;
  color: white;
  text-align: center;
  padding: 20px;
}

nav {
  background: #333;
  color: white;
  display: flex;
  justify-content: space-between;
  padding: 10px;
}

button {
  background: #c00;
  color: white;
  border: none;
  padding: 8px;
  margin-left: 5px;
  cursor: pointer;
}

main {
  max-width: 900px;
  margin: 20px auto;
  background: white;
  padding: 20px;
}

article {
  margin-bottom: 20px;
}

img {
  max-width: 100%;
  cursor: move;
}

.toolbar {
  display: none;
  background: #eee;
  padding: 10px;
  text-align: center;
}

[contenteditable="true"] {
  border: 1px dashed #999;
}
</style>
</head>

<body>

<header>LE JOURNAL DU JOUR</header>

<nav>
<div>Actualités</div>
<div>
<button id="btnConnexion">Connexion</button>
</div>
</nav>

<div class="toolbar" id="toolbar">
<button onclick="document.execCommand('bold')">Gras</button>
<button onclick="document.execCommand('italic')">Italique</button>
<button onclick="document.execCommand('underline')">Souligné</button>
<button id="addImg">Ajouter image</button>
</div>

<main id="contenu">
<article contenteditable="false">
<h2>Titre</h2>
<p>Ton texte ici...</p>
</article>
</main>

<script>
let edition = false;
const btn = document.getElementById("btnConnexion");
const articles = document.querySelectorAll("article");
const toolbar = document.getElementById("toolbar");
const contenu = document.getElementById("contenu");

// Charger sauvegarde
window.onload = () => {
  const saved = localStorage.getItem("journal");
  if (saved) contenu.innerHTML = saved;
};

// Sauvegarde
function save() {
  localStorage.setItem("journal", contenu.innerHTML);
}

// Mode édition
btn.onclick = () => {
  if (!edition) {
    const code = prompt("Code :");
    if (code === "1953") {
      edition = true;
      toolbar.style.display = "block";
      document.querySelectorAll("article").forEach(a => a.contentEditable = true);
      alert("Mode édition activé");
    }
  } else {
    edition = false;
    toolbar.style.display = "none";
    document.querySelectorAll("article").forEach(a => a.contentEditable = false);
    save();
    alert("Sauvegardé !");
  }
};

// Sauvegarde auto
document.addEventListener("input", () => {
  if (edition) save();
});

// Ajouter image
const addImg = document.getElementById("addImg");
addImg.onclick = () => {
  const url = prompt("URL image :");
  if (url) {
    const img = document.createElement("img");
    img.src = url;
    img.draggable = true;
    document.activeElement.appendChild(img);
  }
};

// Drag image
let dragged;
document.addEventListener("dragstart", e => {
  if (e.target.tagName === "IMG") dragged = e.target;
});

document.addEventListener("dragover", e => e.preventDefault());

document.addEventListener("drop", e => {
  e.preventDefault();
  if (dragged && edition) {
    e.target.appendChild(dragged);
    save();
  }
});

</script>

</body>
</html>
