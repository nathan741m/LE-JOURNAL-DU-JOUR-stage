<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Journal du Jour</title>

<style>
body {
  font-family: "Times New Roman", serif;
  margin: 0;
  background-color: #f4f4f4;
  color: #222;
}

header {
  background-color: #c00;
  color: white;
  text-align: center;
  padding: 20px 0;
  font-size: 2rem;
  font-weight: bold;
}

nav {
  background-color: #333;
  color: white;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 20px;
}

nav button {
  background-color: #c00;
  border: none;
  color: white;
  padding: 8px 15px;
  cursor: pointer;
}

main {
  max-width: 900px;
  margin: 30px auto;
  background-color: white;
  padding: 20px;
}

article {
  margin-bottom: 30px;
}

article h2 {
  color: #c00;
  border-bottom: 2px solid #c00;
}

img {
  max-width: 100%;
  cursor: move;
  resize: both;
  overflow: auto;
  display: inline-block;
}

footer {
  text-align: center;
  background: #222;
  color: white;
  padding: 10px;
}

.toolbar {
  display: none;
  background: #eee;
  padding: 10px;
  text-align: center;
}

[contenteditable="true"] {
  border: 1px dashed #999;
}
</style>
</head>

<body>

<header>LE JOURNAL DU JOUR</header>

<nav>
<div>Actualités • Culture • Sport • Monde</div>
<div>
<button id="btnConnexion">Connexion</button>
</div>
</nav>

<div class="toolbar" id="toolbar">
<button onclick="document.execCommand('bold')">Gras</button>
<button onclick="document.execCommand('italic')">Italique</button>
<button onclick="document.execCommand('underline')">Souligné</button>
<input type="color" id="colorPicker" title="Couleur du texte">
<button onclick="changeColor()">Couleur</button>
<button id="addImg">Ajouter image</button>
</div>

<main id="contenu">
<article contenteditable="false">
<h2>Titre de l'article</h2>
<p>Ici votre article de presse...</p>
<img src="https://via.placeholder.com/800x400" alt="Image">
</article>
</main>

<footer>© 2024 Le Journal du Jour</footer>

<script>
let edition = false;
const btn = document.getElementById("btnConnexion");
const toolbar = document.getElementById("toolbar");
const contenu = document.getElementById("contenu");

// ⚠️ IMPORTANT : stockage en ligne (remplace localStorage)
const API_URL = "https://api.jsonbin.io/v3/b/69c688e1aa77b81da9268bd3"; // mets ton ID ici
const API_KEY = "$2a$10$d5sWZMQASHzuGZ0D2PbdBucxhG.PLiiSr/8M1UQ.e6JQV8P1wOLze"; // mets ta clé ici

// Charger depuis internet
async function loadOnline() {
  try {
    const res = await fetch(API_URL, {
      headers: { "X-Master-Key": API_KEY }
    });
    const data = await res.json();
    if (data.record) contenu.innerHTML = data.record.content;
  } catch (err) {
    console.log("Erreur chargement", err);
  }
}

// Sauvegarder en ligne
async function saveOnline() {
  try {
    await fetch(API_URL, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        "X-Master-Key": API_KEY
      },
      body: JSON.stringify({ content: contenu.innerHTML })
    });
  } catch (err) {
    console.log("Erreur sauvegarde", err);
  }
}

window.onload = loadOnline;

// Sauvegarde
function save() {
  saveOnline();
}

// Mode édition
btn.onclick = () => {
  if (!edition) {
    const code = prompt("Entrez le code :");
    if (code === "1953") {
      edition = true;
      toolbar.style.display = "block";
      document.querySelectorAll("article").forEach(a => a.contentEditable = true);
    }
  } else {
    edition = false;
    toolbar.style.display = "none";
    document.querySelectorAll("article").forEach(a => a.contentEditable = false);
    save();
  }
};

// Sauvegarde auto
document.addEventListener("input", () => {
  if (edition) saveOnline();
});

// Sauvegarde refresh
window.addEventListener("beforeunload", () => {
  saveOnline();
});

// Ajouter image
const addImg = document.getElementById("addImg");
addImg.onclick = () => {
  const url = prompt("URL image :");
  if (url) {
    const img = document.createElement("img");
    img.src = url;
    img.draggable = true;
    document.activeElement.appendChild(img);
    save();
  }
};

// Drag image
let dragged;
document.addEventListener("dragstart", e => {
  if (e.target.tagName === "IMG") dragged = e.target;
});

document.addEventListener("dragover", e => e.preventDefault());

document.addEventListener("drop", e => {
  e.preventDefault();
  if (dragged && edition) {
    e.target.appendChild(dragged);
    save();
  }
});

// Redimensionner image avec molette
contenu.addEventListener("wheel", (e) => {
  if (edition && e.target.tagName === "IMG") {
    e.preventDefault();
    let width = e.target.width;
    width += e.deltaY > 0 ? -20 : 20;
    e.target.style.width = width + "px";
    save();
  }
});

// Couleur texte
function changeColor() {
  const color = document.getElementById("colorPicker").value;
  document.execCommand("foreColor", false, color);
}

document.addEventListener("dragover", e => e.preventDefault());

document.addEventListener("drop", e => {
  e.preventDefault();
  if (dragged && edition) {
    e.target.appendChild(dragged);
    save();
  }
});

</script>

</body>
</html>
